<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name generator</title>
</head>
<body>
    <script>
        let a,b,c;
        let x=Math.random()*100;
        if(x<33){
            a="Crazy";
        }
        else if(x<66){
            a="Amazing";
        }
        else{
            a="Fire";
        }

        let y=Math.random()*100;
        if(y<33){
            b="Engine";
        }
        else if(y<66){
            b="Food";
        }
        else{
            b="Garments";
        }
        let z=Math.random()*100;
        if(z<33){
            c="Bros";
        }
        else if(z<66){
            c="Limited";
        }
        else{
            c="Hub";
        }

        console.log(a,b,c);

    </script>
</body>
</html>
