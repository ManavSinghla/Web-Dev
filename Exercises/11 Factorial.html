        let a=prompt("Enter the number: ");
        
        function Factorial(number){
            let arr=[];
            for(let i=0;i<number;i++){
                arr[i]=i+1
            }
            let ans=arr.reduce((a,b)=>{
                return a*b;
            })

        }
        Factorial(a);
